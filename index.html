<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dict</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.4/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: transparent; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Search bar ── */
#search-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #1565C0; flex-shrink: 0; }
#search-input { flex: 1; padding: 7px 12px; border: none; border-radius: 20px; font-size: 15px; outline: none; background: rgba(255,255,255,0.95); color: #1a237e; font-weight: 600; min-width: 0; transition: box-shadow 0.15s; }
#search-input::placeholder { color: #90a4ae; font-weight: 400; }
#search-input.typing { box-shadow: 0 0 0 2px rgba(255,220,80,0.7); }
.bar-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.2s; flex-shrink: 0; }
.bar-btn:hover { background: rgba(255,255,255,0.38); }
.bar-btn.active { background: rgba(255,220,0,0.4); }
#stop-float-btn { display: none; align-items: center; gap: 5px; padding: 5px 11px; border: none; border-radius: 16px; background: #b71c1c; color: white; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
#restart-float-btn { display: none; align-items: center; gap: 5px; padding: 5px 11px; border: none; border-radius: 16px; background: #2e7d32; color: white; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
.nav-button { padding: 6px 14px; border: none; border-radius: 16px; background: #f9a825; color: #1a1a1a; font-size: 12px; font-weight: 700; cursor: pointer; margin-bottom: 4px; }

/* ── Lang indicator bar ── */
#lang-bar { display: flex; align-items: center; gap: 8px; padding: 5px 12px; background: #0d47a1; flex-shrink: 0; border-bottom: 2px solid #1565C0; min-height: 30px; }
#lang-indicator { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 0.4px; flex: 1; }
#lang-indicator .lang-pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 4px; }
#lang-indicator .pill-en { background: #1976D2; color: #fff; }
#lang-indicator .pill-od { background: #880e4f; color: #fff; }
#lang-indicator .pill-hi { background: #1b5e20; color: #fff; }
#lang-indicator .pill-odia { background: #4a148c; color: #fff; }

/* ── Odia dict toggle button ── */
#odia-dict-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.2s; flex-shrink: 0; }
#odia-dict-btn:hover { background: rgba(255,255,255,0.38); }
#odia-dict-btn.odia-on { background: rgba(180,0,255,0.45); box-shadow: 0 0 0 2px #ce93d8; }

/* ── Odia mode banner ── */
#odia-mode-banner { display: none; background: #4a148c; color: #fff; text-align: center; font-size: 12px; font-weight: 700; padding: 5px 10px; flex-shrink: 0; letter-spacing: 0.3px; }
#odia-mode-banner.visible { display: block; }
#odia-loading { display: none; text-align: center; padding: 6px; font-size: 12px; color: #78909c; background: #fff; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }

/* ── Suggestions panels ── */
#suggestions { flex-shrink: 0; max-height: 140px; overflow-y: auto; background: #fff; border-top: 1px solid #e0e0e0; transition: opacity 0.2s; }
#suggestions.hidden { opacity: 0; pointer-events: none; }
#suggestions.visible { opacity: 1; }
.sugg-item { padding: 9px 14px; font-size: 14px; color: #1565C0; cursor: pointer; border-bottom: 1px solid #f5f5f5; font-weight: 500; }
.sugg-item:hover { background: #e3f2fd; }

/* ── Odia suggestions panel ── */
#odia-suggestions { display: none; flex-shrink: 0; background: #f3e5f5; border-bottom: 2px solid #ce93d8; max-height: 200px; overflow-y: auto; }
#odia-suggestions.visible { display: block; }
.osugg-label { font-size: 10px; font-weight: 700; color: #7b1fa2; letter-spacing: 0.5px; padding: 6px 14px 2px; text-transform: uppercase; }
.osugg-item { padding: 10px 14px; font-size: 16px; color: #1a1a1a; cursor: pointer; border-bottom: 1px solid #e1bee7; font-family: 'Noto Serif Odia','Noto Sans Odia','Segoe UI',sans-serif; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.osugg-item:hover { background: #e1bee7; }
.osugg-sp { font-size: 12px; color: #7b1fa2; font-family: 'Segoe UI',sans-serif; font-weight: 600; }
.osugg-empty { padding: 12px 14px; font-size: 13px; color: #ab47bc; font-style: italic; }

/* ── Reverse suggestions panel ── */
#reverse-suggestions { display: none; flex-shrink: 0; max-height: 200px; overflow-y: auto; border-bottom: 2px solid #ccc; }
#reverse-suggestions.od-mode { display: block; background: #fce4ec; border-bottom-color: #f48fb1; }
#reverse-suggestions.hi-mode { display: block; background: #e8f5e9; border-bottom-color: #a5d6a7; }
.rsugg-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 14px 2px; text-transform: uppercase; }
.od-mode .rsugg-label { color: #880e4f; }
.hi-mode .rsugg-label { color: #1b5e20; }
.rsugg-item { padding: 10px 14px; font-size: 15px; color: #1a1a1a; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.07); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.od-mode .rsugg-item:hover { background: #f8bbd0; }
.hi-mode .rsugg-item:hover { background: #c8e6c9; }
.rsugg-native { font-size: 16px; font-weight: 600; font-family: 'Noto Serif Odia','Noto Sans Odia','Noto Sans Devanagari','Segoe UI',sans-serif; }
.rsugg-en { font-size: 12px; color: #1565C0; font-weight: 700; font-family: 'Segoe UI',sans-serif; }
.rsugg-empty { padding: 12px 14px; font-size: 13px; font-style: italic; color: #888; }

/* ── Custom TTS panel ── */
#custom-tts { display: none; padding: 10px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; max-height: 220px; overflow-y: auto; }
#custom-text { width: 100%; height: 80px; padding: 8px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; resize: none; outline: none; font-family: 'Segoe UI', sans-serif; line-height: 1.5; display: block; }
#custom-display { display: none; width: 100%; min-height: 50px; max-height: 100px; overflow-y: auto; padding: 8px; font-size: 15px; border: 1px solid #c5cae9; border-radius: 8px; background: #f3f6ff; line-height: 1.7; word-wrap: break-word; white-space: pre-wrap; cursor: text; color: #212121; font-family: 'Segoe UI', sans-serif; }
#custom-display .tok { border-radius: 3px; padding: 0 1px; transition: background 0.15s; }
#custom-display .tok.hl { background: #ffe082; }
.tts-controls { display: flex; gap: 5px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.tts-lang { padding: 6px 10px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; color: white; font-size: 12px; flex-shrink: 0; }
.tts-lang[data-lang="en"] { background: #1565C0; }
.tts-lang[data-lang="or"] { background: #880e4f; }
.tts-lang[data-lang="hi"] { background: #1b5e20; }
#save-btn        { padding: 6px 10px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; background: #e65100; color: white; font-size: 12px; flex-shrink: 0; }
#upload-file-btn { padding: 6px 10px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; background: #6a1b9a; color: white; font-size: 12px; flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
#file-upload-input { display: none; }
#custom-play-btn { padding: 6px 10px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; background: #37474f; color: white; font-size: 12px; flex-shrink: 0; }
#custom-play-btn.playing { background: #b71c1c; }
#fullscreen-btn  { padding: 6px 10px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; background: #00695c; color: white; font-size: 12px; flex-shrink: 0; }
#custom-close    { background: #eee; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; flex-shrink: 0; margin-left: auto; }

/* ══ FULLSCREEN READER ══ */
#reader-overlay { display: none; position: fixed; inset: 0; z-index: 9999; flex-direction: column; overflow: hidden; }
#reader-overlay.open { display: flex; }
#reader-topbar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; flex-shrink: 0; background: var(--topbar-bg); border-bottom: 1px solid var(--border); min-height: 46px; }
#reader-title { flex: 1; font-size: 13px; color: var(--muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.rctrl { padding: 5px 10px; border: none; border-radius: 14px; font-size: 11px; font-weight: 700; cursor: pointer; flex-shrink: 0; color: #fff; white-space: nowrap; }
.rctrl.file  { background: #6a1b9a; }
.rctrl.play  { background: #00897b; }
.rctrl.play.playing { background: #c62828; }
.rctrl.close { background: #555; }
#reader-settings { display: flex; align-items: center; gap: 8px; padding: 6px 10px; flex-shrink: 0; background: var(--settings-bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.rs-group { display: flex; align-items: center; gap: 4px; }
.rs-group label { font-size: 10px; color: var(--muted); white-space: nowrap; }
.rs-group input[type=range] { width: 60px; accent-color: #00bfa5; cursor: pointer; }
#reader-theme-btns { display: flex; gap: 4px; }
.theme-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.2s; }
.theme-dot.active { border-color: #00bfa5; }
#page-nav { display: none; align-items: center; justify-content: center; gap: 6px; padding: 5px 10px; flex-shrink: 0; background: var(--settings-bg); border-bottom: 1px solid var(--border); }
#page-nav.visible { display: flex; }
.pnav-btn { padding: 4px 11px; border: none; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--btn-bg); color: var(--text); transition: background 0.15s; }
.pnav-btn:disabled { opacity: 0.3; cursor: default; }
.pnav-btn:not(:disabled):active { background: #00bfa5; color: #111; }
#page-label { font-size: 12px; color: var(--muted); min-width: 90px; text-align: center; font-weight: 600; }
#page-jump { width: 46px; padding: 3px 5px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--content-bg); color: var(--text); text-align: center; outline: none; }
#reader-content-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px 40px; background: var(--content-bg); }
#reader-content { max-width: 700px; margin: 0 auto; line-height: 1.9; white-space: pre-wrap; word-break: break-word; font-size: 17px; color: var(--text); font-family: 'Georgia','Noto Serif',serif; animation: pageFade 0.16s ease; }
@keyframes pageFade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
#reader-content .rtok { border-radius: 3px; padding: 0 2px; transition: background 0.1s; cursor: pointer; }
#reader-content .rtok:hover { background: var(--tok-hover); }
#reader-content .rtok.rhl { background: #ffe082; color: #111 !important; }
#reader-upload-prompt { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 20px; text-align: center; }
#reader-upload-prompt .prompt-icon { font-size: 48px; }
#reader-upload-prompt p { font-size: 15px; line-height: 1.5; max-width: 280px; color: var(--muted); }
#reader-upload-prompt .prompt-btn { padding: 10px 24px; border: none; border-radius: 20px; background: #6a1b9a; color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
#reader-info { padding: 4px 12px; flex-shrink: 0; background: var(--settings-bg); border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); text-align: center; }
#reader-progress { height: 2px; background: #00bfa5; width: 0%; position: fixed; top: 0; left: 0; z-index: 10001; transition: width 0.2s; }

/* THEMES */
body[data-reader-theme="dark"] { --topbar-bg:#1a1a1a; --settings-bg:#161616; --content-bg:#111; --text:#ddd; --muted:#666; --border:#2a2a2a; --btn-bg:#2a2a2a; --tok-hover:rgba(0,191,165,0.18); }
body[data-reader-theme="light"] { --topbar-bg:#f0f0f0; --settings-bg:#f5f5f5; --content-bg:#fafafa; --text:#1a1a1a; --muted:#888; --border:#ddd; --btn-bg:#e0e0e0; --tok-hover:rgba(0,137,123,0.14); }
body[data-reader-theme="sepia"] { --topbar-bg:#ede3cc; --settings-bg:#e8dcc4; --content-bg:#f5ecd7; --text:#3b2f12; --muted:#9a8050; --border:#d4c5a0; --btn-bg:#d9cdb0; --tok-hover:rgba(120,80,0,0.12); }

/* ── Results area ── */
#results-area { flex: 1; overflow-y: auto; padding: 10px; background: #f5f5f5; position: relative; }
#typing-indicator { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); flex-direction: column; align-items: center; gap: 10px; pointer-events: none; z-index: 2; }
#typing-indicator.visible { display: flex; }
.typing-dots { display: flex; gap: 6px; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #1565C0; opacity: 0.2; animation: typingPulse 0.9s ease-in-out infinite; }
.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.18s; }
.typing-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingPulse { 0%,100% { opacity:0.15; transform:scale(0.85); } 50% { opacity:0.9; transform:scale(1.2); } }
.typing-label { font-size: 11px; color: #90a4ae; font-weight: 600; letter-spacing: 0.5px; }
#results-inner { transition: opacity 0.22s ease, transform 0.22s ease; will-change: opacity,transform; }
#results-inner.hidden { opacity: 0; transform: translateY(5px); pointer-events: none; }
#results-inner.visible { opacity: 1; transform: translateY(0); }

/* ── Result cards ── */
.result-card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.lang-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; line-height: 1.4; }
.lang-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; text-transform: uppercase; }
.badge-en { background: #e3f2fd; color: #1565C0; }
.badge-od { background: #fce4ec; color: #880e4f; }
.badge-hi { background: #e8f5e9; color: #1b5e20; }
.badge-sp { background: #fff3e0; color: #e65100; }
.badge-def { background: #f3e5f5; color: #6a1b9a; }
.lang-text { font-size: 15px; color: #212121; font-weight: 500; }
.tok { border-radius: 3px; padding: 0 1px; }
.tok.tok-hl { background: #ffe082; }
.result-card img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 140px; object-fit: contain; background: #fafafa; }

/* ── Odia dict entry card ── */
.odia-entry-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.13); animation: slideIn 0.2s ease; }
.odia-entry-headword { font-size: 20px; font-weight: 700; color: #4a148c; font-family: 'Noto Serif Odia','Noto Sans Odia',serif; line-height: 1.3; margin-bottom: 2px; }
.odia-entry-spelling { font-size: 13px; color: #e65100; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.2px; }
.odia-entry-divider { border: none; border-top: 1px solid #ede7f6; margin: 8px 0; }
.odia-entry-meaning { font-size: 14px; color: #212121; line-height: 1.85; white-space: pre-wrap; word-break: break-word; font-family: 'Noto Serif Odia','Noto Sans Odia','Segoe UI',sans-serif; }
.odia-result-count { font-size: 12px; color: #7b1fa2; font-weight: 700; margin-bottom: 8px; padding: 4px 10px; background: #f3e5f5; border-radius: 8px; display: inline-block; }

#status { text-align: center; padding: 20px; color: #90a4ae; font-size: 14px; }
.loading-dots::after { content: '...'; animation: dots 1s steps(4,end) infinite; }
@keyframes dots { 0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'} }
#no-result { display: none; padding: 16px; text-align: center; color: #b0bec5; font-size: 14px; }
#no-result span { font-size: 28px; display: block; margin-bottom: 6px; }
#toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(16px); background: #323232; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 10002; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body data-reader-theme="dark">

<div id="reader-progress"></div>

<!-- Donate -->
<div style="text-align:center;padding:5px 0 2px">
  <button class="nav-button" id="donate-btn">💲 Donate to Support Us</button>
</div>

<!-- Search bar -->
<div id="search-bar">
  <input id="search-input" type="text" placeholder="Search in English, ଓଡ଼ିଆ or हिंदी…" autocomplete="off" spellcheck="false">
  <button id="stop-float-btn">🫧 Stop</button>
  <button id="restart-float-btn">🔄 Start</button>
  <button id="odia-dict-btn" title="Odia Dictionary (Odia ↔ Odia Meaning)">ଓ</button>
  <button id="read-btn" class="bar-btn" title="Reader">📝</button>
  <button id="speak-btn" class="bar-btn" title="Speak">🔊</button>
</div>

<!-- Language indicator bar -->
<div id="lang-bar">
  <span id="lang-indicator">Auto-detecting language…</span>
</div>

<!-- Odia dict mode banner -->
<div id="odia-mode-banner">📖 Odia Dictionary — ଓଡ଼ିଆ ଶବ୍ଦ ବା Spelling ଟାଇପ କରନ୍ତୁ</div>
<div id="odia-loading">Loading Odia Dictionary<span class="loading-dots"></span></div>

<!-- Suggestions panels -->
<div id="odia-suggestions"></div>
<div id="reverse-suggestions"></div>
<div id="suggestions"></div>

<!-- Custom TTS panel -->
<div id="custom-tts">
  <textarea id="custom-text" placeholder="Type or paste text… or open a file. Tap 💾 to save."></textarea>
  <div id="custom-display" title="Tap to edit"></div>
  <div class="tts-controls">
    <button class="tts-lang" data-lang="en">EN</button>
    <button class="tts-lang" data-lang="or">OD</button>
    <button class="tts-lang" data-lang="hi">HI</button>
    <button id="save-btn">💾 Save</button>
    <button id="upload-file-btn">📂 File</button>
    <input type="file" id="file-upload-input" accept=".txt,.html,.htm,.docx,.doc,.pdf,.md,.rtf">
    <button id="custom-play-btn">▶ Play</button>
    <button id="fullscreen-btn">⛶ Read</button>
    <button id="custom-close">✕</button>
  </div>
</div>

<!-- Results -->
<div id="results-area">
  <div id="typing-indicator">
    <div class="typing-dots">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
    <div class="typing-label">typing…</div>
  </div>
  <div id="results-inner" class="visible">
    <div id="status">Loading dictionaries<span class="loading-dots"></span></div>
    <div id="no-result"><span>🔍</span>No results found</div>
  </div>
</div>
<div id="toast"></div>

<!-- FULLSCREEN READER -->
<div id="reader-overlay">
  <div id="reader-topbar">
    <span id="reader-title">Reader</span>
    <button id="reader-file-btn" class="rctrl file">📂 File</button>
    <button id="reader-play-btn" class="rctrl play">▶ Play</button>
    <button id="reader-close-btn" class="rctrl close">✕</button>
  </div>
  <div id="reader-settings">
    <div class="rs-group"><label>Size</label><input type="range" id="font-size-range" min="13" max="30" value="17" step="1"></div>
    <div class="rs-group"><label>Speed</label><input type="range" id="speed-range" min="0.5" max="2.0" value="0.88" step="0.05"></div>
    <div class="rs-group"><label>Page</label><input type="range" id="page-size-range" min="100" max="1000" value="400" step="50"></div>
    <div class="rs-group"><label>Theme</label>
      <div id="reader-theme-btns">
        <div class="theme-dot active" data-theme="dark" style="background:#111;"></div>
        <div class="theme-dot" data-theme="sepia" style="background:#f5ecd7;"></div>
        <div class="theme-dot" data-theme="light" style="background:#f0f0f0;"></div>
      </div>
    </div>
  </div>
  <div id="page-nav">
    <button class="pnav-btn" id="pg-first">⏮</button>
    <button class="pnav-btn" id="pg-prev">◀</button>
    <span id="page-label">Page 1 / 1</span>
    <button class="pnav-btn" id="pg-next">▶</button>
    <button class="pnav-btn" id="pg-last">⏭</button>
    <input id="page-jump" type="number" min="1" placeholder="#">
  </div>
  <div id="reader-content-wrap">

//  LANGUAGE HELPERS

const reOdia  = /[\u0B00-\u0B7F]/;
const reHindi = /[\u0900-\u097F]/;
const reEng   = /[a-zA-Z]/;

function detectInputLang(text) {
  if (!text || !text.trim()) return null;
  const t = text.trim();
  const odiaCount  = (t.match(/[\u0B00-\u0B7F]/g)||[]).length;
  const hindiCount = (t.match(/[\u0900-\u097F]/g)||[]).length;
  const engCount   = (t.match(/[a-zA-Z]/g)||[]).length;
  if (odiaCount === 0 && hindiCount === 0 && engCount === 0) return null;
  if (odiaCount >= hindiCount && odiaCount >= engCount) return 'od';
  if (hindiCount >= odiaCount && hindiCount >= engCount) return 'hi';
  return 'en';
}

const detectLang = t => reOdia.test(t) ? 'or' : reHindi.test(t) ? 'hi' : reEng.test(t) ? 'en' : null;

function filterForLang(text, lang) {
  if (lang === 'or') return text.replace(/[a-zA-Z\u0900-\u097F]/g, ' ').replace(/\s+/g, ' ').trim();
  if (lang === 'hi') return text.replace(/[\u0B00-\u0B7F]/g, ' ').replace(/\s+/g, ' ').trim();
  if (lang === 'en') return text.replace(/[\u0B00-\u0B7F\u0900-\u097F]/g, ' ').replace(/\s+/g, ' ').trim();
  return text;
}

function splitByLang(text) {
  if (!text) return [];
  let cur = '', curLang = null; const raw = [];
  for (const ch of text) {
    const l = reOdia.test(ch) ? 'or' : reHindi.test(ch) ? 'hi' : reEng.test(ch) ? 'en' : null;
    if (l && l !== curLang) { if (cur) raw.push({ text: cur, lang: curLang || 'en' }); cur = ''; curLang = l; }
    cur += ch;
  }
  if (cur) raw.push({ text: cur, lang: curLang || 'en' });
  const out = [];
  for (const s of raw) {
    if (out.length && out[out.length-1].lang === s.lang) out[out.length-1].text += s.text;
    else out.push({ ...s });
  }
  return out.filter(s => s.text.trim());
}

// ══════════════════════════════════════════════════════════════════════
//  ODIA CHAR NORMALISER
// ══════════════════════════════════════════════════════════════════════
function _odiaBaseClean(input) {
  if (!input) return '';
  let s = input.trim();
  try { s = s.normalize('NFC'); } catch(e) {}
  s = s
    .replace(/[\u200B-\u200D\u2060\uFEFF\u00AD]/g, '')
    .replace(/\u0B70/g, '\u0B03')
    .replace(/\u0B4D{2,}/g, '\u0B4D').replace(/\u0B02{2,}/g, '\u0B02').replace(/\u0B03{2,}/g, '\u0B03').replace(/\u0B3C{2,}/g, '\u0B3C')
    .replace(/\u0B01\u0B02|\u0B02\u0B01/g, '\u0B02')
    .replace(/\u0B21\u0B3C/g, '\u0B5C').replace(/\u0B22\u0B3C/g, '\u0B5D')
    .replace(/\u0B30\u0B3C/g, '\u0B5C')
    .replace(/([\u0B00-\u0B7F])\s+\u0B4D\s*([\u0B00-\u0B7F])/g, '$1\u0B4D$2')
    .replace(/([\u0B00-\u0B7F])\u0B4D\s+([\u0B00-\u0B7F])/g, '$1\u0B4D$2')
    .replace(/\s+/g, ' ').trim();
  return s;
}
function normaliseOdiaVariants(input) {
  if (!input) return [];
  const base = _odiaBaseClean(input); if (!base) return [];
  const variants = new Set();
  const sub = (s, from, to) => s.split(from).join(to);
  const hasBA=base.includes('\u0B2C'), hasVA=base.includes('\u0B35'), hasWA=base.includes('\u0B71');
  const hasYA=base.includes('\u0B2F'), hasYYA=base.includes('\u0B5F');
  const hasCandra=base.includes('\u0B01'), hasAnu=base.includes('\u0B02');
  const hasRRApre=base.includes('\u0B5C'), hasRRHApre=base.includes('\u0B5D');
  let forms=[base];
  if(hasBA) forms=forms.flatMap(f=>[f,sub(f,'\u0B2C','\u0B35')]);
  if(hasVA) forms=forms.flatMap(f=>[f,sub(f,'\u0B35','\u0B2C')]);
  if(hasWA) forms=forms.map(f=>sub(f,'\u0B71','\u0B35'));
  if(hasYA) forms=forms.flatMap(f=>[f,sub(f,'\u0B2F','\u0B5F')]);
  if(hasYYA) forms=forms.flatMap(f=>[f,sub(f,'\u0B5F','\u0B2F')]);
  if(hasCandra) forms=forms.flatMap(f=>[f,sub(f,'\u0B01','\u0B02')]);
  if(hasAnu) forms=forms.flatMap(f=>[f,sub(f,'\u0B02','\u0B01')]);
  if(hasRRApre) forms=forms.flatMap(f=>[f,sub(f,'\u0B5C','\u0B21\u0B3C')]);
  if(hasRRHApre) forms=forms.flatMap(f=>[f,sub(f,'\u0B5D','\u0B22\u0B3C')]);
  if(base.includes('\u0B21\u0B3C')) forms=forms.flatMap(f=>[f,sub(f,'\u0B21\u0B3C','\u0B5C')]);
  if(base.includes('\u0B22\u0B3C')) forms=forms.flatMap(f=>[f,sub(f,'\u0B22\u0B3C','\u0B5D')]);
  forms.forEach(f=>{if(f) variants.add(f);});
  const result=[base]; variants.forEach(v=>{if(v!==base) result.push(v);}); return result;
}
function normaliseSpelling(input) {
  if (!input) return '';
  let s = input.trim().toLowerCase();
  try { s = s.normalize('NFC'); } catch(e) {}
  s = s.replace(/[\u200B-\u200D\uFEFF\u00AD]/g, '')
    .replace(/ā/g,'a').replace(/â/g,'a').replace(/ī/g,'i').replace(/î/g,'i')
    .replace(/ū/g,'u').replace(/û/g,'u').replace(/ē/g,'e').replace(/ê/g,'e').replace(/ō/g,'o').replace(/ô/g,'o')
    .replace(/ḍ/g,'d').replace(/ṭ/g,'t').replace(/ṇ/g,'n').replace(/ṣ/g,'s').replace(/ś/g,'s')
    .replace(/ṁ/g,'m').replace(/ḥ/g,'h').replace(/ṛ/g,'r').replace(/ṝ/g,'r')
    .replace(/aa/g,'a').replace(/ii/g,'i').replace(/uu/g,'u').replace(/ee/g,'i').replace(/oo/g,'u')
    .replace(/w/g,'v').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
  return s;
}
function normaliseNative(s) {
  if (!s) return '';
  try { return s.trim().normalize('NFC'); } catch(e) { return s.trim(); }
}

let _queue=[], _ttsRunning=false, _cbStore={}, _idN=0, ttsRate=0.88;
function _runNext() {
  if (!_queue.length) { _ttsRunning=false; return; }

    const u=new SpeechSynthesisUtterance(item.text);
    u.lang=item.lang==='or'?'or-IN':item.lang==='hi'?'hi-IN':'en-US';
    u.rate=ttsRate; u.onend=u.onerror=()=>{ item.cb?.(); _runNext(); };
    speechSynthesis.speak(u);
  } else { item.cb?.(); _runNext(); }
}
window._attsOnEnd = id => { const cb=_cbStore[id]; delete _cbStore[id]; cb?.(); _runNext(); };
function ttsSpeak(text,lang,cb) {
  if (!text?.trim()) { cb?.(); return; }
  _queue.push({id:'s'+(++_idN),text,lang:lang||'en',cb});
  if (!_ttsRunning) _runNext();
}
function ttsCancel() {

let mainSpeaking=false;
function tokeniseLangText(spanEl) {

}
function buildMainTasks() {
  const allToks=[];
  document.querySelectorAll('#results-area .lang-text,#results-area .odia-entry-headword,#results-area .odia-entry-spelling,#results-area .odia-entry-meaning')
    .forEach(s=>allToks.push(...tokeniseLangText(s)));
  const tasks=[]; let chunk=[],chunkLang=null;
  const flush=()=>{if(!chunk.length) return; const t=filterForLang(chunk.map(t=>t.text).join(' '),chunkLang); if(t) tasks.push({text:t,lang:chunkLang,toks:[...chunk]}); chunk=[];chunkLang=null;};
  allToks.forEach(t=>{if(t.lang!==chunkLang) flush(); chunkLang=t.lang; chunk.push(t);}); flush();
  return tasks;
}

document.getElementById('speak-btn').addEventListener('click', function() {

// ══════════════════════════════════════════════════════════════════════
//  FILE EXTRACTION
// ══════════════════════════════════════════════════════════════════════
async function extractTextFromFile(file) {
  const n=file.name.toLowerCase();
  if (n.endsWith('.txt')||n.endsWith('.md')||n.endsWith('.rtf')) return readAsText(file);
  if (n.endsWith('.html')||n.endsWith('.htm')) {
    const raw=await readAsText(file), doc=new DOMParser().parseFromString(raw,'text/html');
    doc.querySelectorAll('script,style,noscript').forEach(el=>el.remove());
    return (doc.body.innerText||doc.body.textContent||'').trim();
  }
  if (n.endsWith('.docx')||n.endsWith('.doc')) return extractDocx(file);
  if (n.endsWith('.pdf')) return extractPdf(file);
  return readAsText(file);
}
const readAsText=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result||'');r.onerror=()=>rej(new Error('Read failed'));r.readAsText(f,'utf-8');});
const readAsArrayBuffer=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Read failed'));r.readAsArrayBuffer(f);});
async function extractDocx(file) {
  try {
    const buf=await readAsArrayBuffer(file), xml=await unzipEntry(new Uint8Array(buf),'word/document.xml');
    if (!xml) return '(Could not read DOCX)';
    return xml.replace(/<w:br[^/]*/g,'\n').replace(/<w:p[ >]/g,'\n').replace(/<[^>]+>/g,'')
      .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
      .replace(/\n{3,}/g,'\n\n').trim()||'(Empty document)';
  } catch(e){return '(DOCX error: '+e.message+')';}
}
function unzipEntry(uint8,targetPath) {
  return new Promise(resolve=>{
    try{
      const sig=[0x50,0x4B,0x03,0x04];let i=0;
      while(i<uint8.length-30){
        if(uint8[i]===sig[0]&&uint8[i+1]===sig[1]&&uint8[i+2]===sig[2]&&uint8[i+3]===sig[3]){
          const comp=uint8[i+8]|(uint8[i+9]<<8),cSize=uint8[i+18]|(uint8[i+19]<<8)|(uint8[i+20]<<16)|(uint8[i+21]<<24);
          const fnLen=uint8[i+26]|(uint8[i+27]<<8),exLen=uint8[i+28]|(uint8[i+29]<<8),ns=i+30;
          const name=new TextDecoder().decode(uint8.slice(ns,ns+fnLen)),ds=ns+fnLen+exLen;
          if(name===targetPath){
            const cd=uint8.slice(ds,ds+cSize);
            if(comp===0){resolve(new TextDecoder().decode(cd));return;}
            if(comp===8){try{resolve(new TextDecoder().decode(pako.inflateRaw(cd)));return;}catch(e2){resolve(null);return;}}
            resolve(null);return;
          }
          i=ds+Math.max(0,cSize);
        }else{i++;}
      }resolve(null);
    }catch(e){resolve(null);}
  });
}
async function extractPdf(file) {
  if (!window.pdfjsLib){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  try{
    const buf=await readAsArrayBuffer(file),pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
    let out='';
    for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p),tc=await page.getTextContent();out+=tc.items.map(i=>i.str).join(' ')+'\n\n';}
    return out.trim()||'(No text found in PDF)';
  }catch(e){return '(PDF error: '+e.message+')';}
}

//  DATABASE
// ══════════════════════════════════════════════════════════════════════
const DB_URLS = {
  eo: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/english_odia.db.gz',
  eh: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/english_hindi.db.gz',
  om: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/odia_meaning.db.gz'
};
const CACHE='float-dict-v1';
let dbEO=null, dbEH=null, dbReady=false, pendingWord=null;
let dbOM=null, dbOMReady=false;

async function loadDB(url) {
  let buffer;
  try {
    const c=await caches.open(CACHE);let r=await c.match(url);
    if(!r){r=await fetch(url);if(r.ok) await c.put(url,r.clone());}
    buffer=await r.arrayBuffer();
  }catch(e){buffer=await(await fetch(url)).arrayBuffer();}
  return pako.ungzip(new Uint8Array(buffer));
}
async function initDB() {
  try {
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});
    const [eoD,ehD]=await Promise.all([loadDB(DB_URLS.eo),loadDB(DB_URLS.eh)]);
    dbEO=new SQL.Database(eoD); dbEH=new SQL.Database(ehD); dbReady=true;
    document.getElementById('status').style.display='none';
    updateLangBar(null);
    if(pendingWord){showPopup(pendingWord);pendingWord=null;}
  }catch(e){document.getElementById('status').textContent='⚠️ Dictionary offline';}
}
async function loadOdiaDB() {
  if(dbOMReady) return true;
  document.getElementById('odia-loading').style.display='block';
  try{
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});
    const omD=await loadDB(DB_URLS.om);
    dbOM=new SQL.Database(omD); dbOMReady=true;
    document.getElementById('odia-loading').style.display='none';
    return true;
  }catch(e){document.getElementById('odia-loading').textContent='⚠️ Odia Dictionary failed to load';return false;}
}

function dbQuery(db,sql,params) {
  if(!db) return [];
  try{const s=db.prepare(sql);s.bind(params);const rows=[];while(s.step()) rows.push(s.getAsObject());s.free();return rows;}
  catch(e){return [];}
}
function mergeRows(rows) {
  const map=new Map();
  rows.forEach(r=>{const k=(r.English||'').toLowerCase();if(!map.has(k)) map.set(k,{...r});else Object.assign(map.get(k),r);});
  return [...map.values()];
}
function escHtml(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
async function loadImageSrc(url) {
  try{const c=await caches.open(CACHE);let r=await c.match(url);if(!r){r=await fetch(url);if(r.ok) await c.put(url,r.clone());}return URL.createObjectURL(await r.blob());}
  catch(e){return null;}
}

// ══════════════════════════════════════════════════════════════════════
//  ODIA MEANING FORMATTER
// ══════════════════════════════════════════════════════════════════════
function formatOdiaMeaning(raw) {
  if(!raw) return '';
  return raw.replace(/([^\n])(\s+)(\d+\s)/g,(_,before,_ws,num)=>before+'\n'+num).trim();
}

// ══════════════════════════════════════════════════════════════════════
//  ODIA DICTIONARY MODE (Odia ↔ Odia meaning)
// ══════════════════════════════════════════════════════════════════════
function buildOdiaVariants(raw) {
  const isScript=/[\u0B00-\u0B7F]/.test(raw);
  const seen=new Set(); const variants=[];
  const add=v=>{if(v&&v.trim()&&!seen.has(v)){seen.add(v);variants.push(v);}};
  if(isScript){add(raw);normaliseOdiaVariants(raw).forEach(add);}
  else{add(raw);add(normaliseSpelling(raw));}
  return variants;
}
function odiaExactSearch(word) {
  if(!dbOMReady||!dbOM) return [];
  const variants=buildOdiaVariants(word);
  for(const v of variants){
    let rows=dbQuery(dbOM,'SELECT odia,odia_spelling,odia_meaning FROM dictionary WHERE odia=?',[v]);
    if(rows.length) return rows;
    rows=dbQuery(dbOM,'SELECT odia,odia_spelling,odia_meaning FROM dictionary WHERE LOWER(odia_spelling)=LOWER(?)',[v]);
    if(rows.length) return rows;
  }
  return [];
}
function odiaPrefixSearch(word,limit) {
  limit=limit||14; if(!dbOMReady||!dbOM) return [];
  const variants=buildOdiaVariants(word); const seen=new Set(); const results=[];
  for(const v of variants){
    if(!v) continue;
    const isScript=/[\u0B00-\u0B7F]/.test(v);
    let rows;
    if(isScript) rows=dbQuery(dbOM,'SELECT odia,odia_spelling FROM dictionary WHERE odia LIKE ? LIMIT ?',[v+'%',limit]);
    else rows=dbQuery(dbOM,'SELECT odia,odia_spelling FROM dictionary WHERE LOWER(odia_spelling) LIKE LOWER(?) LIMIT ?',[v+'%',limit]);
    for(const r of rows){
      const key=(r.odia||'')+'|'+(r.odia_spelling||'');
      if(!seen.has(key)){seen.add(key);results.push(r);}
      if(results.length>=limit) return results;
    }
  }
  return results;
}
function showOdiaSuggestions(word) {
  if(!dbOMReady||!dbOM) return;
  const panel=document.getElementById('odia-suggestions'); panel.innerHTML='';
  const w=word.trim(); if(!w){panel.classList.remove('visible');return;}
  const isOdiaScript=/[\u0B00-\u0B7F]/.test(w);
  const rows=odiaPrefixSearch(w,14);
  if(!rows.length){
    const em=document.createElement('div'); em.className='osugg-empty'; em.textContent='No matches found…'; panel.appendChild(em); panel.classList.add('visible'); return;
  }
  const label=document.createElement('div'); label.className='osugg-label'; label.textContent=isOdiaScript?'ଓଡ଼ିଆ ଶବ୍ଦ — ଚୟନ କରନ୍ତୁ':'Spelling matches — tap to view'; panel.appendChild(label);
  rows.forEach(r=>{
    const item=document.createElement('div'); item.className='osugg-item';
    const main=document.createElement('span'); main.textContent=isOdiaScript?(r.odia||''):(r.odia_spelling||''); item.appendChild(main);
    const secondary=isOdiaScript?r.odia_spelling:r.odia;
    if(secondary){const sp=document.createElement('span');sp.className='osugg-sp';sp.textContent=secondary;item.appendChild(sp);}
    item.addEventListener('click',()=>{

      const chosenWord=exactWord||w;
      document.getElementById('search-input').value=chosenWord;

// ══════════════════════════════════════════════════════════════════════
//  REVERSE SEARCH — OD→EN and HI→EN
// ══════════════════════════════════════════════════════════════════════
function reverseOdiaExact(word) {
  if(!dbReady) return [];
  const w=normaliseNative(word); if(!w) return [];
  let rows=dbQuery(dbEO,"SELECT English,odia FROM dictionary WHERE odia=? OR odia LIKE ? OR odia LIKE ? OR odia LIKE ? OR odia LIKE ?",[w,w+', %',w+'; %',w+'/ %',w+' %']);
  if(!rows.length && reOdia.test(w)){
    const variants=normaliseOdiaVariants(w);
    for(const v of variants){
      if(v===w) continue;
      const r2=dbQuery(dbEO,"SELECT English,odia FROM dictionary WHERE odia=? OR odia LIKE ? OR odia LIKE ? OR odia LIKE ? OR odia LIKE ?",[v,v+', %',v+'; %',v+'/ %',v+' %']);
      if(r2.length){rows=r2;break;}
    }
  }
  return rows.map(r=>{
    if(!r.English) return r;
    const hRows=dbQuery(dbEH,'SELECT hindi,image FROM dictionary WHERE English=?',[r.English]);
    if(hRows.length) return {...r,hindi:hRows[0].hindi,image:hRows[0].image};
    return r;
  });
}

function reverseOdiaPrefix(word,limit) {
  limit=limit||12; if(!dbReady) return [];
  const w=normaliseNative(word); if(!w) return [];
  const seen=new Set(); const results=[];
  const tryQ=(q,params)=>{
    dbQuery(dbEO,q,params).forEach(r=>{
      const key=(r.English||'').toLowerCase();
      if(!seen.has(key)){seen.add(key);results.push(r);}
    });
  };
  tryQ('SELECT English,odia FROM dictionary WHERE odia LIKE ? LIMIT ?',[w+'%',limit]);
  if(results.length<limit&&reOdia.test(w)){
    normaliseOdiaVariants(w).forEach(v=>{
      if(v!==w&&results.length<limit) tryQ('SELECT English,odia FROM dictionary WHERE odia LIKE ? LIMIT ?',[v+'%',limit]);
    });
  }
  return results.slice(0,limit);
}

function reverseHindiExact(word) {
  if(!dbReady) return [];
  const w=normaliseNative(word); if(!w) return [];
  let rows=dbQuery(dbEH,"SELECT English,hindi,image FROM dictionary WHERE hindi=? OR hindi LIKE ? OR hindi LIKE ? OR hindi LIKE ? OR hindi LIKE ?",[w,w+', %',w+'; %',w+'/ %',w+' %']);
  return rows.map(r=>{
    if(!r.English) return r;
    const oRows=dbQuery(dbEO,'SELECT odia FROM dictionary WHERE English=?',[r.English]);
    if(oRows.length) return {...r,odia:oRows[0].odia};
    return r;
  });
}

function reverseHindiPrefix(word,limit) {
  limit=limit||12; if(!dbReady) return [];
  const w=normaliseNative(word); if(!w) return [];
  return dbQuery(dbEH,'SELECT English,hindi FROM dictionary WHERE hindi LIKE ? LIMIT ?',[w+'%',limit]);
}

// ══════════════════════════════════════════════════════════════════════
//  UNIFIED SEARCH LOGIC  —  1-second debounce, no Enter required
// ══════════════════════════════════════════════════════════════════════
const SEARCH_DELAY = 1000; // 1 seconds debounce for all modes
let _searchTimer=null, _rafHandle=null, _lastVal='', _typingState=false;

const _input     = document.getElementById('search-input');
const _indicator = document.getElementById('typing-indicator');
const _inner     = document.getElementById('results-inner');
const _suggEl    = document.getElementById('suggestions');

function _showResults() {
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    _indicator.classList.remove('visible');
    _inner.classList.remove('hidden'); _inner.classList.add('visible');
  }));
}

function _enterTypingState() {
  if(!_typingState){_typingState=true; _input.classList.add('typing');}
  clearTimeout(_searchTimer);
  if(_rafHandle) cancelAnimationFrame(_rafHandle);
  _rafHandle=requestAnimationFrame(()=>{
    _inner.classList.add('hidden'); _inner.classList.remove('visible');
    _suggEl.classList.add('hidden'); _suggEl.classList.remove('visible');
    _indicator.classList.add('visible'); _rafHandle=null;
  });
}

function triggerSearch(val) {
  _lastVal=val;
  const lang=detectInputLang(val);
  detectedLang=lang;

  // ── Odia Dictionary mode ──
  if(odiaMode){
    if(!val.trim()){
      _typingState=false; _input.classList.remove('typing'); _indicator.classList.remove('visible');
      clearOdiaResults(); return;
    }
    _enterTypingState();
    _searchTimer=setTimeout(()=>{
      _typingState=false; _input.classList.remove('typing');
      // Try exact first, fall back to suggestions
      const exactRows=odiaExactSearch(val.trim());
      if(exactRows.length){
        document.getElementById('odia-suggestions').classList.remove('visible');
        document.getElementById('odia-suggestions').innerHTML='';
        _renderOdiaEntries(exactRows);
      } else {
        showOdiaSuggestions(val.trim());
        _showResults();
      }
    }, SEARCH_DELAY);
    updateLangBar('odia-dict');
    return;
  }

  updateLangBar(lang);

  // ── Odia / Hindi reverse mode ──
  if(lang==='od'||lang==='hi'){
    if(!val.trim()){
      _typingState=false; _input.classList.remove('typing'); _indicator.classList.remove('visible');
      hideReverseSuggestions(); clearResults();
      _inner.classList.remove('hidden'); _inner.classList.add('visible');
      return;
    }
    _enterTypingState();
    _searchTimer=setTimeout(()=>{
      _typingState=false; _input.classList.remove('typing');
      hideReverseSuggestions(); clearResults();
      const exactRows=lang==='od'?reverseOdiaExact(val):reverseHindiExact(val);
      if(exactRows.length){
        renderResults(mergeRows(exactRows)); _showResults();
      } else {
        const suggRows=lang==='od'?reverseOdiaPrefix(val,12):reverseHindiPrefix(val,12);
        showReverseSuggestions(suggRows,lang==='od'?'od-mode':'hi-mode');
        _showResults();
      }
    }, SEARCH_DELAY);
    return;
  }

  // ── English / unknown ──
  if(!val.trim()){
    _typingState=false; _input.classList.remove('typing'); _indicator.classList.remove('visible');
    clearResults(); _inner.classList.remove('hidden'); _inner.classList.add('visible');
    _suggEl.innerHTML=''; _suggEl.classList.remove('hidden'); _suggEl.classList.add('visible');
    return;
  }
  _enterTypingState();
  _searchTimer=setTimeout(()=>{
    _typingState=false; _input.classList.remove('typing');
    doEnSearch(val);
    _showResults();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      _suggEl.classList.remove('hidden'); _suggEl.classList.add('visible');
    }));
  }, SEARCH_DELAY);
}

// ══════════════════════════════════════════════════════════════════════
//  HIGH-PERFORMANCE PAGINATED READER
// ══════════════════════════════════════════════════════════════════════
const R={fileName:'',allTokens:[],wordCount:0,pageTokens:[],curPage:0,totalPages:0,wordsPerPage:400,playing:false};
const PAGE_PFX='rpage:';
function parseAllTokens(text){
  const tokens=[]; let wordIdx=0;
  for(const p of text.split(/(\s+)/)){
    if(!p) continue;
    if(/^\s+$/.test(p)) tokens.push({text:p,isWord:false,lang:null,globalWordIdx:-1});
    else tokens.push({text:p,isWord:true,lang:detectLang(p)||'en',globalWordIdx:wordIdx++});
  }
  return tokens;
}
function computePages(tokens,wpp){
  const boundaries=[]; let wc=0,pageStart=-1;
  for(let i=0;i<tokens.length;i++){
    if(pageStart===-1) pageStart=i;
    if(tokens[i].isWord&&++wc>=wpp){boundaries.push(pageStart);wc=0;pageStart=-1;}
  }
  if(pageStart!==-1) boundaries.push(pageStart);
  if(!boundaries.length) boundaries.push(0);
  return boundaries;
}
let _pageBounds=[0];
function renderPage(pageIdx){
  pageIdx=Math.max(0,Math.min(pageIdx,R.totalPages-1));
  const content=document.getElementById('reader-content');
  const startTok=_pageBounds[pageIdx],endTok=pageIdx+1<_pageBounds.length?_pageBounds[pageIdx+1]:R.allTokens.length;
  const frag=document.createDocumentFragment(); R.pageTokens=[];
  for(let i=startTok;i<endTok;i++){
    const tok=R.allTokens[i];
    if(!tok.isWord){frag.appendChild(document.createTextNode(tok.text));}
    else{const sp=document.createElement('span');sp.className='rtok';sp.textContent=tok.text;R.pageTokens.push({el:sp,text:tok.text,lang:tok.lang,globalWordIdx:tok.globalWordIdx});frag.appendChild(sp);}
  }
  content.style.display='block'; document.getElementById('reader-upload-prompt').style.display='none';
  content.innerHTML=''; content.appendChild(frag);
  R.curPage=pageIdx; document.getElementById('reader-content-wrap').scrollTop=0;
  updatePageNav(); updateReaderProgress(); localStorage.setItem(PAGE_PFX+R.fileName,pageIdx);
}
function updatePageNav(){
  const nav=document.getElementById('page-nav');
  if(R.totalPages<=1){nav.classList.remove('visible');return;} nav.classList.add('visible');
  document.getElementById('page-label').textContent=`Page ${R.curPage+1} / ${R.totalPages}`;
  document.getElementById('pg-first').disabled=R.curPage===0; document.getElementById('pg-prev').disabled=R.curPage===0;
  document.getElementById('pg-next').disabled=R.curPage>=R.totalPages-1; document.getElementById('pg-last').disabled=R.curPage>=R.totalPages-1;
}
function navToPage(idx){const wasPlaying=R.playing;stopReaderPlay();renderPage(idx);if(wasPlaying&&R.pageTokens.length) setTimeout(()=>playFromToken(0),60);}
document.getElementById('pg-first').addEventListener('click',()=>navToPage(0));
document.getElementById('pg-prev').addEventListener('click',()=>navToPage(R.curPage-1));
document.getElementById('pg-next').addEventListener('click',()=>navToPage(R.curPage+1));
document.getElementById('pg-last').addEventListener('click',()=>navToPage(R.totalPages-1));
document.getElementById('page-jump').addEventListener('change',function(){const v=parseInt(this.value,10);if(!isNaN(v)) navToPage(Math.max(0,Math.min(R.totalPages-1,v-1)));this.value='';});
document.getElementById('page-size-range').addEventListener('input',function(){
  if(!R.allTokens.length) return;
  const firstGlobalWordIdx=R.pageTokens[0]?.globalWordIdx??0;
  R.wordsPerPage=parseInt(this.value,10);
  _pageBounds=computePages(R.allTokens,R.wordsPerPage); R.totalPages=_pageBounds.length;
  let targetPage=0;
  for(let p=_pageBounds.length-1;p>=0;p--){let ti=_pageBounds[p];while(ti<R.allTokens.length&&!R.allTokens[ti].isWord) ti++;if(ti<R.allTokens.length&&R.allTokens[ti].globalWordIdx<=firstGlobalWordIdx){targetPage=p;break;}}
  stopReaderPlay(); renderPage(targetPage); updateInfo();
});
function openReader(text,name){
  R.fileName=name||'Reader'; document.getElementById('reader-title').textContent=R.fileName;
  document.getElementById('reader-overlay').classList.add('open'); document.body.style.overflow='hidden';
  if(text&&text.trim()) loadReaderText(text);
  else{document.getElementById('reader-upload-prompt').style.display='flex';document.getElementById('reader-content').style.display='none';document.getElementById('reader-info').textContent='No file loaded';document.getElementById('page-nav').classList.remove('visible');}
}
function closeReader(){stopReaderPlay();document.getElementById('reader-overlay').classList.remove('open');document.body.style.overflow='';}
function loadReaderText(text){
  stopReaderPlay();
  R.allTokens=parseAllTokens(text); R.wordCount=R.allTokens.filter(t=>t.isWord).length;
  _pageBounds=computePages(R.allTokens,R.wordsPerPage); R.totalPages=_pageBounds.length; updateInfo();
  const content=document.getElementById('reader-content');
  if(content._tapHandler) content.removeEventListener('click',content._tapHandler);
  content._tapHandler=function(e){const sp=e.target.closest('.rtok');if(!sp) return;const idx=R.pageTokens.findIndex(t=>t.el===sp);if(idx<0) return;stopReaderPlay();playFromToken(idx);showToast('Reading from here…');};
  content.addEventListener('click',content._tapHandler);
  const savedPage=Math.min(parseInt(localStorage.getItem(PAGE_PFX+R.fileName)||'0',10),R.totalPages-1); renderPage(savedPage);
}
function updateInfo(){document.getElementById('reader-info').textContent=`${R.wordCount.toLocaleString()} words · ${R.totalPages} page${R.totalPages!==1?'s':''} · ${R.fileName}`;}
function buildTasks(pageTokens,startIdx){
  const tasks=[]; let chunk=[],chunkLang=null;
  const flush=()=>{if(!chunk.length) return;const text=filterForLang(chunk.map(t=>t.text).join(' '),chunkLang);if(text) tasks.push({text,lang:chunkLang,toks:[...chunk]});chunk=[];chunkLang=null;};
  for(let i=startIdx;i<pageTokens.length;i++){const t=pageTokens[i];if(t.lang!==chunkLang) flush();chunkLang=t.lang;chunk.push(t);} flush(); return tasks;
}
function runTasks(tasks){
  const btn=document.getElementById('reader-play-btn'); let i=0;
  function next(){
    clearReaderHL(); if(!R.playing){R.playing=false;btn.textContent='▶ Play';btn.classList.remove('playing');return;}
    if(i<tasks.length){const task=tasks[i++];task.toks.forEach(t=>t.el.classList.add('rhl'));task.toks[0].el.scrollIntoView({block:'center',behavior:'smooth'});ttsSpeak(task.text,task.lang,next);}
    else{
      if(R.curPage<R.totalPages-1){renderPage(R.curPage+1);requestAnimationFrame(()=>requestAnimationFrame(()=>{if(!R.playing){btn.textContent='▶ Play';btn.classList.remove('playing');return;}const nextTasks=buildTasks(R.pageTokens,0);if(nextTasks.length){tasks.length=0;nextTasks.forEach(t=>tasks.push(t));i=0;next();}else{R.playing=false;btn.textContent='▶ Play';btn.classList.remove('playing');}}));}
      else{R.playing=false;btn.textContent='▶ Play';btn.classList.remove('playing');showToast('✓ Finished reading');}
    }
  } next();
}
function playFromToken(tokIdx){if(!R.pageTokens.length) return;const tasks=buildTasks(R.pageTokens,tokIdx);if(!tasks.length) return;R.playing=true;const btn=document.getElementById('reader-play-btn');btn.textContent='⏸ Stop';btn.classList.add('playing');runTasks(tasks);}
function clearReaderHL(){R.pageTokens.forEach(t=>t.el.classList.remove('rhl'));}
function stopReaderPlay(){if(R.playing){ttsCancel();R.playing=false;}clearReaderHL();const btn=document.getElementById('reader-play-btn');btn.textContent='▶ Play';btn.classList.remove('playing');}
document.getElementById('reader-play-btn').addEventListener('click',function(){if(R.playing){stopReaderPlay();return;}if(!R.pageTokens.length){showToast('No text loaded!');return;}playFromToken(0);});
function updateReaderProgress(){const wrap=document.getElementById('reader-content-wrap');const max=wrap.scrollHeight-wrap.clientHeight;const intraScroll=max>0?wrap.scrollTop/max:0;const progress=R.totalPages>1?(R.curPage+intraScroll)/R.totalPages:intraScroll;document.getElementById('reader-progress').style.width=(Math.min(progress,1)*100)+'%';}
document.getElementById('reader-content-wrap').addEventListener('scroll',updateReaderProgress);
document.getElementById('reader-close-btn').addEventListener('click',closeReader);
document.getElementById('font-size-range').addEventListener('input',function(){document.getElementById('reader-content').style.fontSize=this.value+'px';});
document.getElementById('speed-range').addEventListener('input',function(){ttsRate=parseFloat(this.value);});
document.querySelectorAll('.theme-dot').forEach(dot=>{
  dot.addEventListener('click',function(){document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));this.classList.add('active');document.body.setAttribute('data-reader-theme',this.dataset.theme);});
});

// ══════════════════════════════════════════════════════════════════════
updateLangBar(null);
initDB();
</script>
</body>
</html>
